driver:
  kind: modern_ebpf

falco:
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/rules.d

  plugins:
    - name: container
      library_path: libcontainer.so
      init_config:
        label_max_len: 100
        with_size: false
        hooks:
          - create
        engines:
          bpm:
            enabled: true
          lxc:
            enabled: true
          libvirt_lxc:
            enabled: true
          docker:
            enabled: true
            sockets:
              - /var/run/docker.sock
          podman:
            enabled: true
            sockets:
              - /run/podman/podman.sock
          containerd:
            enabled: true
            sockets:
              - /run/host-containerd/containerd.sock
          cri:
            enabled: true
            sockets:
              - /run/containerd/containerd.sock
              - /run/crio/crio.sock
              - /run/k3s/containerd/containerd.sock
              - /run/host-containerd/containerd.sock

  load_plugins: []

  json_output: true
  json_include_output_property: true
  log_stderr: true
  log_syslog: false
  priority: warning

falcoctl:
  artifact:
    install:
      enabled: false
    follow:
      enabled: false

customRules:
  voting-app-rules.yaml: |-
    - list: voting_app_containers
      items:
        - vote
        - result
        - worker
        - redis
        - postgres

    - rule: Shell spawned in voting app container
      desc: A shell was opened inside an example-voting-app pod
      condition: >
        spawned_process and
        k8s.ns.name = hello-world and
        container.name in (voting_app_containers) and
        proc.name in (bash, sh, zsh, dash, ksh)
      output: >
        Shell detected in voting-app pod
        (pod=%container.name user=%user.name cmd=%proc.cmdline ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [voting-app, shell, intrusion]

    - rule: Unexpected write in voting app container
      desc: A write occurred in an unexpected path inside a voting-app pod
      condition: >
        open_write and
        k8s.ns.name = hello-world and
        container.name in (voting_app_containers) and
        not fd.name startswith /tmp and
        not fd.name startswith /var/log and
        not fd.name startswith /proc and
        not fd.name startswith /var/lib/postgresql
      output: >
        Unexpected write in voting-app pod
        (pod=%container.name file=%fd.name user=%user.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [voting-app, filesystem]

    - rule: ServiceAccount token read in voting app
      desc: A process read the ServiceAccount token (potential privilege escalation)
      condition: >
        open_read and
        k8s.ns.name = hello-world and
        container.name in (voting_app_containers) and
        fd.name = /var/run/secrets/kubernetes.io/serviceaccount/token
      output: >
        ServiceAccount token read in voting-app pod
        (pod=%container.name proc=%proc.name user=%user.name ns=%k8s.ns.name)
      priority: ERROR
      tags: [voting-app, credentials, rbac]

    - rule: Privilege escalation attempt in voting app
      desc: setuid/setgid syscall detected inside a voting-app pod
      condition: >
        evt.type in (setuid, setgid) and
        k8s.ns.name = hello-world and
        container.name in (voting_app_containers) and
        not user.uid = 0
      output: >
        Privilege escalation attempt in voting-app pod
        (pod=%container.name proc=%proc.name user=%user.name uid=%user.uid ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [voting-app, privilege-escalation]

    - rule: Unexpected outbound connection from voting app
      desc: Outbound connection to an unexpected destination from a voting-app pod
      condition: >
        outbound and
        k8s.ns.name = hello-world and
        container.name in (vote, result, worker)
      output: >
        Unexpected outbound connection from voting-app pod
        (pod=%container.name dst=%fd.rip:%fd.rport proc=%proc.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [voting-app, network, exfiltration]

# Run only on worker nodes, not on the master
tolerations: []
nodeSelector:
  node-role.kubernetes.io/worker: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
